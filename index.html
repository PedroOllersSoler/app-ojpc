<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>APP_OJPC v2.3</title>
<link rel="manifest" href="manifest.json">
<style>
html,body{margin:0;padding:0;background:#0a0906;color:#e8e0d0;font-family:'Courier New',monospace;font-size:11px;min-height:100vh}
*{box-sizing:border-box}
/* NAV */
.nav{display:flex;align-items:center;background:#0d0b07;border-bottom:1px solid #2a2816;padding:0 14px;height:38px;gap:4px}
.nav-logo{color:#c8a84b;font-size:13px;font-weight:bold;letter-spacing:3px;margin-right:20px;white-space:nowrap}
.nav-tab{padding:0 14px;height:38px;line-height:38px;cursor:pointer;color:#5a4f35;font-size:10px;letter-hspacing:1px;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}
.nav-tab:hover{color:#c8a84b}.nav-tab.active{color:#c8a84b;border-bottom-color:#c8a84b}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:6px;padding:6px 14px;background:#0d0b07;border-bottom:1px solid #1a1810;flex-wrap:wrap}
.btn{background:#14120a;border:1px solid #3a3020;color:#c8a84b;padding:4px 10px;cursor:pointer;font-size:10px;font-family:'Courier New',monospace;letter-spacing:.5px;transition:all .15s;white-space:nowrap}
.btn:hover{background:#1e1a0a;border-color:#c8a84b}
.btn-sm{padding:2px 6px;font-size:9px}
.btn-danger{color:#ff4e4e;border-color:#5a1010}.btn-danger:hover{background:#1a0808;border-color:#ff4e4e}
.sel,.inp{background:#14120a;border:1px solid #2a2816;color:#c8b890;padding:3px 6px;font-size:10px;font-family:'Courier New',monospace}
.sel:focus,.inp:focus{outline:none;border-color:#c8a84b;color:#e8e0d0}
.pnl-btn{background:#14120a;border:1px solid #3a3020;color:#c8a84b;padding:4px 10px;cursor:pointer;font-size:10px;font-family:'Courier New',monospace}
.pnl-btn.rmode{border-color:#F39C12;color:#F39C12}
/* PAGES */
.page{display:none}.page.active{display:block}
/* OPS LIST */
.ops-wrap{height:calc(100vh - 88px);overflow-y:auto;padding:6px 10px}
.op-card{border-left:3px solid #2a2816;background:#0d0b07;margin-bottom:3px;transition:border-left-color .15s}
.op-card:hover{background:#0f0d07}
.op-main{display:flex;align-items:center;gap:0;min-height:34px;cursor:pointer;padding:0 6px}
.op-main:hover .op-actions{opacity:1}
.op-cell{padding:2px 5px;flex-shrink:0}
.op-actions{opacity:0;transition:opacity .15s;display:flex;gap:3px;margin-left:auto;padding-left:6px}
/* BADGES */
.tbadge{display:inline-block;padding:1px 5px;font-size:9px;font-weight:bold;letter-spacing:.3px;white-space:nowrap;border:1px solid}
.t-MERCADO{color:#27AE60;border-color:#27AE60;background:#050f07}
.t-LIMITE{color:#c8c0b0;border-color:#5a5040;background:#141210}
.t-NOEJ{color:#F39C12;border-color:#F39C12;background:#0f0900}
.t-NOEJL{color:#ff4e4e;border-color:#ff4e4e;background:#0f0404}
.t-MS{color:#e91e8c;border-color:#e91e8c;background:#0f0408}
.rbadge{display:inline-block;padding:1px 5px;font-size:9px;font-weight:bold;border:1px solid}
.r-WIN{color:#27AE60;border-color:#1a5030;background:#050f07}
.r-LOSS{color:#ff4e4e;border-color:#5a1010;background:#0f0404}
.r-BE{color:#6eb8ff;border-color:#1a3a5a;background:#04080f}
/* SETUP BADGE */
.sbadge{display:inline-block;padding:1px 5px;font-size:9px;font-weight:bold}
/* RR */
.rr-hot{color:#27AE60;font-weight:bold}.rr-mid{color:#F39C12}.rr-low{color:#ff4e4e}
/* DIR */
.dLONG{color:#27AE60;font-weight:bold;font-size:10px}.dSHORT{color:#ff4e4e;font-weight:bold;font-size:10px}
/* DS */
.ds-g{background:#050f07;color:#27AE60;border:1px solid #1a5030;padding:1px 4px;font-size:9px;font-weight:bold}
.ds-o{background:#0f0900;color:#F39C12;border:1px solid #5a3500;padding:1px 4px;font-size:9px;font-weight:bold}
.ds-r{background:#0f0404;color:#ff4e4e;border:1px solid #5a1010;padding:1px 4px;font-size:9px;font-weight:bold}
/* SEPARADORES */
.sep{color:#2a2816;font-size:9px;padding:0 2px}
/* INLINE SELECTS */
.r-sel{background:transparent;border:none;font-size:10px;font-family:'Courier New',monospace;cursor:pointer;padding:0 1px;outline:none}
.r-inp{background:transparent;border:none;font-size:10px;font-family:'Courier New',monospace;padding:0 1px;outline:none}
.r-sel:focus,.r-inp:focus{background:#1a1810}
/* EXPAND */
.exp-body{display:none;border-top:1px solid #1a1810;padding:10px 12px;background:#0a0907}
.exp-body.open{display:block}
.exp-grid{display:grid;gap:10px;margin-bottom:10px}
.fl{color:#5a4f35;font-size:9px;letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.exp-inp{background:transparent;border:none;border-bottom:1px solid #1a1810;color:#e8e0d0;font-size:10px;font-family:'Courier New',monospace;padding:2px 0;width:100%;outline:none}
.exp-inp:focus{border-bottom-color:#c8a84b}
.exp-ta{background:transparent;border:none;color:#e8e0d0;font-size:10px;font-family:'Courier New',monospace;padding:2px 0;width:100%;outline:none;resize:none;overflow:hidden;min-height:28px;border-bottom:1px solid #1a1810}
.exp-ta:focus{border-bottom-color:#c8a84b}
.chip{display:inline-block;padding:2px 6px;border:1px solid #2a2816;color:#706050;cursor:pointer;font-size:9px;margin:1px;font-family:'Courier New',monospace;background:transparent;transition:all .1s;user-select:none}
.chip:hover{border-color:#c8a84b;color:#c8b890}
.chip.on{color:#e8e0d0;border-color:#c8a84b;background:#1e1a0a}
.chip-mal{color:#8a5050;border-color:#3a2020}.chip-mal.on{color:#ffb0b0;border-color:#ff4e4e;background:#1e0808}
.sent-wrap{display:flex;align-items:center;gap:4px}
.sent-num{font-size:11px;min-width:22px;text-align:center;font-weight:bold}
.sent-range{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:#2a2816;outline:none;cursor:pointer}
.sent-range::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#c8a84b;cursor:pointer}
.btn-exp{background:transparent;border:none;color:#5a4f35;cursor:pointer;font-size:9px;font-family:'Courier New',monospace;padding:2px 5px}
.btn-exp:hover{color:#c8a84b}
/* MÉTRICAS */
.metrics-pg{padding:14px 18px;height:calc(100vh - 80px);overflow-y:auto}
.st{font-size:9px;letter-spacing:1.5px;margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid #1a1810;font-weight:bold;text-transform:uppercase}
.mg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.mc{background:#0d0b07;border:1px solid #1a1810;border-left:3px solid;padding:10px 14px;min-width:105px}
.mc-lbl{color:#5a4f35;font-size:9px;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
.mc-val{font-size:18px;font-weight:bold}
/* ANÁLISIS */
.analysis-pg{padding:14px 18px;height:calc(100vh - 80px);overflow-y:auto}
.an-tb{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.chart-box{background:#0d0b07;border:1px solid #1a1810;padding:14px 16px;margin-bottom:12px}
.chart-ttl{font-size:9px;letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase;font-weight:bold}
.chart-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#706050;text-transform:uppercase;letter-spacing:.5px}
.leg-dot{width:8px;height:8px;border-radius:50%}
/* MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#0d0b07;border:1px solid #2a2816;padding:22px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal-title{color:#c8a84b;font-size:11px;letter-spacing:2px;margin-bottom:14px;text-transform:uppercase}
.fond-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a1810;font-size:10px}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="nav">
  <span class="nav-logo">OJPC</span>
  <span class="nav-tab active" id="tab-operativa" onclick="showPage('operativa')">OPERATIVA</span>
  <span class="nav-tab" id="tab-metricas" onclick="showPage('metricas')">MÉTRICAS</span>
  <span class="nav-tab" id="tab-analisis" onclick="showPage('analisis')">ANÁLISIS</span>
</div>

<div id="page-operativa" class="page active">
  <div class="toolbar">
    <button class="btn" onclick="addOp()">+ MANUAL</button>
    <span id="drv-st" style="font-size:9px;padding:2px 8px;border:1px solid #5a1010;color:#ff4e4e;font-family:'Courier New',monospace;white-space:nowrap;letter-spacing:.3px">● SIN CONECTAR</span><button class="btn btn-sm" onclick="driveLogin()" id="btn-drv-login">☁ CONECTAR</button><button class="btn btn-sm" onclick="driveSave()" id="btn-drv-up" disabled style="opacity:0.4">↑ SUBIR</button><button class="btn btn-sm" onclick="driveLoad()" id="btn-drv-dn" disabled style="opacity:0.4">↓ CARGAR</button>
    <button class="btn" onclick="openImport()">JSON IMPORTAR</button>
    <input class="inp" id="f-semana" placeholder="SEMANA" style="width:72px" oninput="applyFilters()">
    <select class="sel" id="f-tipo" onchange="applyFilters()"><option value="">TODOS TIPOS</option></select>

    <select class="sel" id="f-fond" onchange="applyFilters()"><option value="">TODAS CUENTAS</option></select>

</div>

<div id="page-metricas" class="page">
  <div class="metrics-pg" id="metrics-content"></div>
</div>

<div id="page-analisis" class="page">
  <div class="analysis-pg">
    <div class="an-tb">
      <select class="sel" id="an-modal" onchange="renderAnalysis()"><option value="">TODAS MODAL.</option></select>
      <select class="sel" id="an-sesion" onchange="renderAnalysis()">
        <option value="">TODAS SESIONES</option>
        <option>Asia</option><option>Londres</option><option>Nueva York</option><option>Overlap</option><option>Fuera sesión</option>
      </select>
      <select class="sel" id="an-tipo" onchange="renderAnalysis()"><option value="">TODOS TIPOS</option></select>
      <button class="btn btn-sm" onclick="resetAnalysis()">RESET</button>

    <div id="analysis-content"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modal-fonds">
  <div class="modal">
    <div class="modal-title">CUENTAS FONDEADAS</div>
    <div id="fonds-list" style="margin-bottom:12px"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <input class="inp" id="fond-new-inp" placeholder="Ej: FTMO-01" style="width:160px">
      <button class="btn" onclick="addFond()">+ AÑADIR</button>
    </div>
    <button class="btn" onclick="closeFonds()" style="margin-top:14px">CERRAR</button>

</div>

    <div class="modal-title">IMPORTAR DESDE CLAUDE</div>
    <div style="color:#706050;font-size:10px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Pega el JSON generado por Claude:</div>
    <textarea id="import-ta" style="background:#0a0906;border:1px solid #2a2816;color:#e8e0d0;font-size:10px;font-family:'Courier New',monospace;width:100%;height:140px;outline:none;padding:8px;resize:none" placeholder='{"operaciones":[...]}'></textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn" onclick="doImport()">IMPORTAR</button>
      <button class="btn" onclick="closeImport()">CANCELAR</button>
    </div>
    <div id="import-msg" style="font-size:10px;margin-top:8px;color:#c8a84b"></div>
  </div>
</div>

<script>
var SK='ojpc_2026_v3',SK_FOND='ojpc_fondos_v1';
var TIPOS=['MERCADO','LÍMITE','NO EJECUTADO','NO EJEC. LÍMITE','[MS] MERCADO','[MS] LÍMITE'];
var SETUPS=['GREEN CRYPTO','SFP','MECHA','GREEN C. LIMIT','BLUE','RED','PINK','WHYTE','GREEN FOREX','OTROS'];
var RIESGOS=['0.5%-5k','1%-5k','0.5%-10k','1%-10k','0.5%-25k','1%-25k','0.5%-50k','1%-50k','0.5%-100k','1%-100k'];
var TF_OPTS=['30s','1m','2m','5m','15m','1h','4h'];
var MODALIDADES=['Swing','Day','Scalp','Micro-Scalp','Híbrida','F S-D','F D-S','F S-MS'];
var SESGOS=['Alcista','Bajista','Neutro'];
var SESIONES=['Asia','Londres','Nueva York','Overlap','Fuera sesión'];
var MAL_CATS=['FOMO','REVENGE','MOVÍ STOP','SL AJUSTADO','SL AMPLIO','CERRÉ PRONTO','MANTUVE PÉRD.','SOBRE-APALANCADO','FUERA DE SESIÓN','SIN SETUP','MTF','D. MENOR','TOKES','EJEC.','DUDA','PATRÓN'];
var LEV_OPTS=['Nada','Bajo','Medio','Alto'];

var TIPO_COLORS={'MERCADO':'#27AE60','LÍMITE':'#c8c0b0','NO EJECUTADO':'#F39C12','NO EJEC. LÍMITE':'#ff4e4e','[MS] MERCADO':'#e91e8c','[MS] LÍMITE':'#e91e8c'};
var TIPO_CSS={'MERCADO':'t-MERCADO','LÍMITE':'t-LIMITE','NO EJECUTADO':'t-NOEJ','NO EJEC. LÍMITE':'t-NOEJL','[MS] MERCADO':'t-MS','[MS] LÍMITE':'t-MS'};
var MODAL_COLORS={'Swing':'#27AE60','Day':'#6eb8ff','Scalp':'#F39C12','Micro-Scalp':'#e91e8c','Híbrida':'#c8a84b','F S-D':'#a09880','F D-S':'#a09880','F S-MS':'#a09880'};
var SETUP_COLORS={'GREEN CRYPTO':'#27AE60','SFP':'#c8a84b','MECHA':'#ffb84e','GREEN C. LIMIT':'#a8862b','BLUE':'#4eb8ff','RED':'#ff4e4e','PINK':'#ff9eb8','WHYTE':'#e8e0d0','GREEN FOREX':'#2ecc71','OTROS':'#4a4540'};
var FOND_PAL=['#6eb8ff','#27AE60','#e91e8c','#F39C12','#c8a84b','#ff9eb8','#2ecc71','#ff4e4e'];
var SES_COLORS={'Asia':'#6eb8ff','Londres':'#27AE60','Nueva York':'#F39C12','Overlap':'#c8a84b','Fuera sesión':'#5a4f35'};

var ops=[],fonds=[],expandedId=null,pnlMode=false;
var _fSemana='',_fTipo='',_fSetup='',_fFond='';

function loadOps(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch(e){return[];}}
function saveOps(){try{localStorage.setItem(SK,JSON.stringify(ops));}catch(e){console.error("ERROR GUARDADO:",e);alert("ERROR AL GUARDAR: "+e.message+"\nExporta un backup.");}}
function loadFonds(){try{return JSON.parse(localStorage.getItem(SK_FOND))||[];}catch(e){return[];}}
function saveFonds(){localStorage.setItem(SK_FOND,JSON.stringify(fonds));}
function fondColor(n){var i=fonds.indexOf(n);return i>=0?FOND_PAL[i%FOND_PAL.length]:'#5a4f35';}
function newId(){return Date.now()+Math.floor(Math.random()*1000);}
function seqNum(id){var i=ops.findIndex(function(o){return o.id===id;});return i>=0?ops.length-i:'';}

function emptyOp(){
  return {id:newId(),tipo:'MERCADO',fecha:'',hora:'',sesion:'',activo:'',direccion:'',rr:'',
    resultado:'',resultado_usd:'',semana:'',sesgo:'',modalidad:'',tf_entrada:'',
    sent_antes:0,sent_al_ejecutar:0,sent_durante:0,sent_cierre:0,
    espero:'',bien:'',mal_cats:'',mejorar:'',nota_psico:'',enlace:'',enlace2:'',enlace3:'',
    setup:'',riesgo:'',parciales:'',rr_final:'',leverage:'',
    notas_operativa:'',fondeada:''};
}

function dsScore(op){
  var s=0;
  if(op.setup&&op.setup!=='OTROS')s+=25;
  if(parseFloat(op.rr)>=1.5)s+=25;
  if(op.sesion&&op.sesion!=='Fuera sesión')s+=25;
  if(op.tipo==='MERCADO'||op.tipo==='LÍMITE')s+=25;
  return s;
}
function dsCls(s){return s>=80?'ds-g':s>=50?'ds-o':'ds-r';}
function rrCls(r){var v=parseFloat(r);return isNaN(v)?'':v>=1.5?'rr-hot':v>=0.5?'rr-mid':'rr-low';}
function parseFecha(f){if(!f)return 0;var p=f.split('/');if(p.length!==3)return 0;return new Date(p[2],p[1]-1,p[0]).getTime();}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mC(c){var m=MODAL_COLORS[c];return m||'#a09880';}

function showPage(p){
  ['operativa','metricas','analisis'].forEach(function(n){
    document.getElementById('page-'+n).style.display='none';
    document.getElementById('tab-'+n).classList.remove('active');
  });
  document.getElementById('page-'+p).style.display='block';
  document.getElementById('tab-'+p).classList.add('active');
  if(p==='metricas')renderMetrics();
  if(p==='analisis')renderAnalysis();
}

function populateFilters(){
  var t=document.getElementById('f-tipo'),s=document.getElementById('f-setup'),f=document.getElementById('f-fond');
  t.innerHTML='<option value="">TODOS TIPOS</option>'+TIPOS.map(function(x){return '<option>'+x+'</option>';}).join('');
  s.innerHTML='<option value="">TODOS SETUPS</option>'+SETUPS.map(function(x){return '<option>'+x+'</option>';}).join('');
  f.innerHTML='<option value="">TODAS CUENTAS</option>'+fonds.map(function(x){return '<option>'+x+'</option>';}).join('');
  var am=document.getElementById('an-modal'),at=document.getElementById('an-tipo');
  if(am)am.innerHTML='<option value="">TODAS MODAL.</option>'+MODALIDADES.map(function(x){return '<option>'+x+'</option>';}).join('');
  if(at)at.innerHTML='<option value="">TODOS TIPOS</option>'+TIPOS.map(function(x){return '<option>'+x+'</option>';}).join('');
}

function applyFilters(){
  _fSemana=(document.getElementById('f-semana').value||'').toLowerCase();
  _fTipo=document.getElementById('f-tipo').value;
  _fSetup=document.getElementById('f-setup').value;
  _fFond=document.getElementById('f-fond').value;
  renderOps();
}

function filteredOps(){
  return ops.filter(function(o){
    if(_fSemana&&(!o.semana||o.semana.toLowerCase().indexOf(_fSemana)<0))return false;
    if(_fTipo&&o.tipo!==_fTipo)return false;
    if(_fSetup&&o.setup!==_fSetup)return false;
    if(_fFond&&o.fondeada!==_fFond)return false;
    return true;
  });
}

function togglePNL(){pnlMode=!pnlMode;var b=document.getElementById('pnl-btn');b.textContent=pnlMode?'R':'PNL';b.className=pnlMode?'pnl-btn rmode':'pnl-btn';renderOps();}
function addOp(){ops.unshift(emptyOp());saveOps();renderOps();}
function deleteOp(id){if(!confirm('¿Borrar esta operación?'))return;ops=ops.filter(function(o){return o.id!==id;});if(expandedId===id)expandedId=null;saveOps();renderOps();}
function clearData(){
  if(!confirm(' ¿BORRAR TODAS LAS OPERACIONES?\n\nEsta acción NO se puede deshacer.\nExporta primero si quieres un backup.'))return;
  var conf=prompt('Escribe BORRAR para confirmar:');
  if(conf!=='BORRAR')return;
  ops=[];expandedId=null;saveOps();renderOps();
}
function toggleExpand(id){expandedId=expandedId===id?null:id;renderOps();}

function calcSemana(fecha){
  // fecha: DD/MM/AA o DD/MM/AAAA
  if(!fecha)return '';
  var p=fecha.split('/');if(p.length!==3)return '';
  var y=parseInt(p[2]);if(y<100)y+=2000;
  var d=new Date(y,parseInt(p[1])-1,parseInt(p[0]));
  if(isNaN(d.getTime()))return '';
  // ISO week
  var tmp=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dayNum=tmp.getUTCDay()||7;
  tmp.setUTCDate(tmp.getUTCDate()+4-dayNum);
  var yearStart=new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  var week=Math.ceil((((tmp-yearStart)/86400000)+1)/7);
  var yy=String(d.getFullYear()).slice(2);
  return 'W'+String(week).padStart(2,'0')+'-'+yy;
}

function updateOp(id,field,val){
  var op=ops.find(function(o){return o.id===id;});
  if(!op)return;
  op[field]=val;
  // Auto-calcular semana al cambiar fecha
  if(field==='fecha'&&val){
    var semAuto=calcSemana(val);
    if(semAuto&&!op.semana){
      op.semana=semAuto;
      var semEl=document.querySelector('#exp-semana-'+id);
      if(semEl)semEl.value=semAuto;
    }
  }
  saveOps();
  var score=dsScore(op);
  var badge=document.getElementById('ds-'+id);
  if(badge){badge.className=dsCls(score);badge.textContent=score;}
}

function toggleMalCat(id,cat,el){
  var op=ops.find(function(o){return o.id===id;});if(!op)return;
  var sel=(op.mal_cats||'').split(',').filter(Boolean);
  var idx=sel.indexOf(cat);if(idx>=0)sel.splice(idx,1);else sel.push(cat);
  op.mal_cats=sel.join(',');saveOps();el.classList.toggle('on');
}

function chipToggle(id,field,val,el){
  var op=ops.find(function(o){return o.id===id;});if(!op)return;
  op[field]=op[field]===val?'':val;saveOps();
  el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  if(op[field]===val)el.classList.add('on');
}

function tipoBadge(tipo){return '<span class="tbadge '+(TIPO_CSS[tipo]||'t-LIMITE')+'">'+escH(tipo)+'</span>';}
function resBadge(r){if(!r)return '<span style="color:#3a3020;font-size:9px">-</span>';return '<span class="rbadge '+(r==='WIN'?'r-WIN':r==='LOSS'?'r-LOSS':'r-BE')+'">'+r+'</span>';}

function renderOps(){
  var list=document.getElementById('ops-list');
  var filtered=filteredOps();
  if(filtered.length===0){list.innerHTML='<div style="text-align:center;padding:40px;color:#3a3020;letter-spacing:2px;font-size:10px">SIN OPERACIONES</div>';return;}
  // Ordenar por fecha desc, sin fecha al final
  filtered.sort(function(a,b){
    var da=parseFecha(a.fecha),db=parseFecha(b.fecha);
    if(!da&&!db)return 0;
    if(!da)return 1;
    if(!db)return -1;
    if(db!==da)return db-da;
    return (b.hora||'').localeCompare(a.hora||'');
  });
  var html='';
  filtered.forEach(function(op,idx){html+=renderCard(op,idx+1);});
  list.innerHTML=html;
}

function autoResultado(op){
  if(op.resultado)return op.resultado;
  if(op.resultado_usd){var u=parseFloat(op.resultado_usd);return u>0?'WIN':u<0?'LOSS':'BE';}
  if(op.rr_final){var r=parseFloat(op.rr_final);return r>0?'WIN':r<0?'LOSS':'BE';}
  return '';
}

// IMPORT/EXPORT
function openImport(){document.getElementById('modal-import').classList.add('open');}
function closeImport(){document.getElementById('modal-import').classList.remove('open');document.getElementById('import-ta').value='';document.getElementById('import-msg').textContent='';}
function doImport(){
  var raw=document.getElementById('import-ta').value.trim();
  var msg=document.getElementById('import-msg');
  try{
    var data=JSON.parse(raw);var list=data.operaciones||data;
    if(!Array.isArray(list)){msg.textContent='Error: formato incorrecto';return;}
    var added=0;
    list.forEach(function(item){
      var op=emptyOp();
      Object.keys(item).forEach(function(k){if(k==='notas')op.notas_operativa=item[k];else if(k in op)op[k]=item[k];});
      if(!op.semana&&op.fecha)op.semana=calcSemana(op.fecha);
      ops.unshift(op);added++;
    });
    saveOps();renderOps();
    msg.style.color='#27AE60';msg.textContent=''+added+' operaciones importadas';
    setTimeout(closeImport,1500);
  }catch(e){msg.style.color='#ff4e4e';msg.textContent='Error: JSON inválido';}
}
function exportOp(id){
  var op=ops.find(function(o){return o.id===id;});
  if(!op)return;
  var b=new Blob([JSON.stringify([op],null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='op_'+escH(op.fecha||id)+'_'+escH(op.activo||'')+'_'+escH(op.tipo||'')+'.json';a.click();
}
function exportJSON(){
  var b=new Blob([JSON.stringify(ops,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ojpc_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

function renderMetrics(){
  var c=document.getElementById('metrics-content');if(!c)return;
  var eT=['MERCADO','LÍMITE','[MS] MERCADO','[MS] LÍMITE'];
  var execAll=ops.filter(function(o){return eT.indexOf(o.tipo)>=0;});
  var exec=execAll.filter(function(o){return o.resultado;});
  var sinRes=execAll.length-exec.length;
  var wins=exec.filter(function(o){return o.resultado==='WIN';});
  var losses=exec.filter(function(o){return o.resultado==='LOSS';});
  var wr=exec.length>0?((wins.length/exec.length)*100).toFixed(1):'0';
  var rrV=exec.filter(function(o){return o.rr_final||o.rr;}).map(function(o){return parseFloat(o.rr_final||o.rr);});
  var rrM=rrV.length>0?(rrV.reduce(function(a,b){return a+b;},0)/rrV.length).toFixed(2):'-';
  var usdV=exec.filter(function(o){return o.resultado_usd;}).map(function(o){return parseFloat(o.resultado_usd);});
  var net=usdV.length>0?usdV.reduce(function(a,b){return a+b;},0).toFixed(2):'-';
  var wRR=wins.map(function(o){return parseFloat(o.rr_final||o.rr||0);});
  var wrd=exec.length>0?wins.length/exec.length:0;
  var avgW=wRR.length>0?wRR.reduce(function(a,b){return a+b;},0)/wRR.length:0;
  var exp=exec.length>0?((wrd*avgW)-((1-wrd)*1)).toFixed(3):'-';
  var dsV=exec.map(function(o){return dsScore(o);});
  var dsM=dsV.length>0?(dsV.reduce(function(a,b){return a+b;},0)/dsV.length).toFixed(0):'-';
  var html='';
  if(sinRes>0){html+='<div style="background:#1a1000;border-left:3px solid #F39C12;padding:8px 12px;margin-bottom:12px;font-size:10px;color:#F39C12;letter-spacing:.5px"> '+sinRes+' OP'+(sinRes>1?'S':'')+' SIN RESULTADO - Abre cada op y registra WIN/LOSS/BE para ver WR y métricas completas.</div>';}
  html+='<div class="st" style="color:#c8a84b">GENERAL</div><div class="mg">';
  html+=card('OPS TOTALES',execAll.length,'#e8e0d0','#c8a84b');
  html+=card('CON RESULTADO',exec.length,'#c8b890','#5a4f35');
  html+=card('WIN RATE',exec.length?((wins.length/exec.length)*100).toFixed(1)+'%':'-',exec.length&&(wins.length/exec.length)>=0.5?'#27AE60':'#ff4e4e','#27AE60');
  html+=card('RR MEDIO',rrM,'#6eb8ff','#6eb8ff');
  html+=card('NETO',net==='-'?'-':net+'$',parseFloat(net)>=0?'#27AE60':'#ff4e4e','#27AE60');
  html+=card('EXPECTANCY',exp,parseFloat(exp)>0?'#27AE60':'#ff4e4e','#27AE60');
  html+=card('DS MEDIO',dsM==='NaN'||dsM==='-'?'-':dsM,parseInt(dsM)>=80?'#27AE60':parseInt(dsM)>=50?'#F39C12':'#ff4e4e','#c8a84b');
  html+='</div>';

  var noejec=ops.filter(function(o){return o.tipo==='NO EJECUTADO'||o.tipo==='NO EJEC. LÍMITE';});
  var nRR=noejec.filter(function(o){return o.rr;}).map(function(o){return parseFloat(o.rr);});
  var nMed=nRR.length>0?(nRR.reduce(function(a,b){return a+b;},0)/nRR.length).toFixed(2):'-';
  var nCum=nRR.reduce(function(a,b){return a+b;},0).toFixed(2);
  html+='<div class="st" style="color:#F39C12">NO EJECUTADOS</div><div class="mg">';
  html+=card('TOTAL',noejec.length,'#F39C12','#F39C12');
  html+=card('NO EJEC.',ops.filter(function(o){return o.tipo==='NO EJECUTADO';}).length,'#F39C12','#F39C12');
  html+=card('NO EJEC. LÍMITE',ops.filter(function(o){return o.tipo==='NO EJEC. LÍMITE';}).length,'#ff4e4e','#ff4e4e');
  html+=card('RR MEDIO POTENCIAL',nMed,'#6eb8ff','#6eb8ff');
  html+=card('R ACUM. POTENCIAL',nCum,'#F39C12','#F39C12');
  var nDuda=noejec.filter(function(o){return o.mal_cats&&o.mal_cats.split(',').indexOf('DUDA')>=0&&o.resultado==='WIN';});
  var nDudaR=nDuda.filter(function(o){return o.rr;}).map(function(o){return parseFloat(o.rr);});
  var nDudaCum=nDudaR.length>0?nDudaR.reduce(function(a,b){return a+b;},0).toFixed(2):'0';
  html+=card('R PERDIDO POR DUDA',nDudaCum,'#ff4e4e','#ff4e4e');
  html+='</div>';

  html+='<div class="st">POR TIPO</div><div class="mg">';
  TIPOS.forEach(function(tipo){
    var tOps=ops.filter(function(o){return o.tipo===tipo;});if(!tOps.length)return;
    var tRes=tOps.filter(function(o){return o.resultado;});
    var tW=tRes.filter(function(o){return o.resultado==='WIN';});
    var tRR=tOps.filter(function(o){return o.rr_final||o.rr;}).map(function(o){return parseFloat(o.rr_final||o.rr);});
    var tM=tRR.length>0?(tRR.reduce(function(a,b){return a+b;},0)/tRR.length).toFixed(2):'-';
    var tWR=tRes.length>0?((tW.length/tRes.length)*100).toFixed(0)+'%':'-';
    var col=TIPO_COLORS[tipo]||'#a09880';
    html+=card(tipo+' ('+tOps.length+')',tWR+' · '+tM+'R',col,col);
  });
  html+='</div>';

  html+='<div class="st">POR SESIÓN</div><div class="mg">';
  SESIONES.forEach(function(ses){
    var sOps=execAll.filter(function(o){return o.sesion===ses;});if(!sOps.length)return;
    var sRes=sOps.filter(function(o){return o.resultado;});
    var sW=sRes.filter(function(o){return o.resultado==='WIN';});
    var sWR=sRes.length>0?((sW.length/sRes.length)*100).toFixed(0)+'%':'-';
    var col=SES_COLORS[ses]||'#a09880';
    html+=card(ses+' ('+sOps.length+')',sWR+' WR',sRes.length&&(sW.length/sRes.length)>=0.5?'#27AE60':'#ff4e4e',col);
  });
  html+='</div>';

  html+='<div class="st">POR MODALIDAD</div><div class="mg">';
  MODALIDADES.forEach(function(m){
    var mOps=execAll.filter(function(o){return o.modalidad===m;});if(!mOps.length)return;
    var mRes=mOps.filter(function(o){return o.resultado;});
    var mW=mRes.filter(function(o){return o.resultado==='WIN';});
    var mRR=mOps.filter(function(o){return o.rr_final||o.rr;}).map(function(o){return parseFloat(o.rr_final||o.rr);});
    var mM=mRR.length>0?(mRR.reduce(function(a,b){return a+b;},0)/mRR.length).toFixed(2):'-';
    var mWR=mRes.length>0?((mW.length/mRes.length)*100).toFixed(0)+'%':'-';
    var col=mC(m);
    html+=card(m+' ('+mOps.length+')',mWR+' · '+mM+'R',col,col);
  });
  html+='</div>';

  html+='<div class="st">POR SETUP</div><div class="mg">';
  SETUPS.forEach(function(s){
    var sOps=execAll.filter(function(o){return o.setup===s;});if(!sOps.length)return;
    var sRes=sOps.filter(function(o){return o.resultado;});
    var sW=sRes.filter(function(o){return o.resultado==='WIN';});
    var sRR=sOps.filter(function(o){return o.rr_final||o.rr;}).map(function(o){return parseFloat(o.rr_final||o.rr);});
    var sM=sRR.length>0?(sRR.reduce(function(a,b){return a+b;},0)/sRR.length).toFixed(2):'-';
    var sWR=sRes.length>0?((sW.length/sRes.length)*100).toFixed(0)+'%':'-';
    var col=SETUP_COLORS[s]||'#a09880';
    html+=card(s+' ('+sOps.length+')',sWR+' · '+sM+'R',col,col);
  });
  html+='</div>';

  var errC={};MAL_CATS.forEach(function(c){errC[c]=0;});
  ops.forEach(function(o){if(!o.mal_cats)return;o.mal_cats.split(',').filter(Boolean).forEach(function(c){if(errC[c]!==undefined)errC[c]++;});});
  var errS=MAL_CATS.filter(function(c){return errC[c]>0;}).sort(function(a,b){return errC[b]-errC[a];});
  html+='<div class="st" style="color:#ff4e4e">ERRORES MÁS FRECUENTES</div><div class="mg">';
  if(!errS.length)html+='<div style="color:#3a3020;font-size:10px">SIN ERRORES REGISTRADOS</div>';
  else errS.forEach(function(c,i){html+=card((i+1)+'. '+c,errC[c]+'×',i===0?'#ff4e4e':i===1?'#F39C12':'#a09880','#ff4e4e');});
  html+='</div>';

  if(fonds.length){
    html+='<div class="st">POR FONDEADA</div><div class="mg">';
    fonds.forEach(function(f,fi){
      var fOps=exec.filter(function(o){return o.fondeada===f;});if(!fOps.length)return;
      var fW=fOps.filter(function(o){return o.resultado==='WIN';});
      var fU=fOps.filter(function(o){return o.resultado_usd;}).map(function(o){return parseFloat(o.resultado_usd);});
      var fNet=fU.length?fU.reduce(function(a,b){return a+b;},0).toFixed(2):'-';
      var col=FOND_PAL[fi%FOND_PAL.length];
      html+=card(f+' ('+fOps.length+')',((fW.length/fOps.length)*100).toFixed(0)+'% · '+(fNet!=='-'?fNet+'$':'-'),parseFloat(fNet)>=0?'#27AE60':'#ff4e4e',col);
    });
    html+='</div>';
  }

  html+='<div class="st">PATRÓN EMOCIONAL - CIERRE</div><div class="mg">';
  var cOps=exec.filter(function(o){return o.sent_cierre!==undefined&&o.sent_cierre!=='';});
  if(!cOps.length)html+='<div style="color:#3a3020;font-size:10px">SIN DATOS DE CIERRE</div>';
  else{
    var cM=(cOps.reduce(function(a,o){return a+parseInt(o.sent_cierre||0);},0)/cOps.length).toFixed(2);
    var wC=wins.filter(function(o){return o.sent_cierre!==undefined&&o.sent_cierre!=='';});
    var lC=losses.filter(function(o){return o.sent_cierre!==undefined&&o.sent_cierre!=='';});
    var wM=wC.length?(wC.reduce(function(a,o){return a+parseInt(o.sent_cierre||0);},0)/wC.length).toFixed(1):'-';
    var lM=lC.length?(lC.reduce(function(a,o){return a+parseInt(o.sent_cierre||0);},0)/lC.length).toFixed(1):'-';
    html+=card('MEDIO GENERAL',cM,parseFloat(cM)>0?'#27AE60':'#ff4e4e','#c8a84b');
    html+=card('EN WINNERS',wM,'#27AE60','#27AE60');
    html+=card('EN LOSERS',lM,'#ff4e4e','#ff4e4e');
  }
  html+='</div>';
  c.innerHTML=html;
}

// ANÁLISIS
function resetAnalysis(){document.getElementById('an-modal').value='';document.getElementById('an-sesion').value='';document.getElementById('an-tipo').value='';renderAnalysis();}

function renderAnalysis(){
  var c=document.getElementById('analysis-content');if(!c)return;
  var anM=document.getElementById('an-modal').value;
  var anS=document.getElementById('an-sesion').value;
  var anT=document.getElementById('an-tipo').value;
  var filt=ops.slice();
  if(anM)filt=filt.filter(function(o){return o.modalidad===anM;});
  if(anS)filt=filt.filter(function(o){return o.sesion===anS;});
  if(anT)filt=filt.filter(function(o){return o.tipo===anT;});
  filt.sort(function(a,b){return parseFecha(a.fecha)-parseFecha(b.fecha);});

  var eT=['MERCADO','LÍMITE','[MS] MERCADO','[MS] LÍMITE'];
  var execAll=filt.filter(function(o){return eT.indexOf(o.tipo)>=0;});
  var exec=execAll.filter(function(o){return o.resultado;});
  var noejec=filt.filter(function(o){return (o.tipo==='NO EJECUTADO'||o.tipo==='NO EJEC. LÍMITE')&&o.rr;});
  var html='';

  // EQUITY CURVE
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#27AE60">EQUITY CURVE - R ACUMULADO</div>';
  var cumE=0,ePts=[{y:0,lbl:'0'}];
  exec.forEach(function(o,i){var r=o.resultado==='WIN'?parseFloat(o.rr_final||o.rr||0):o.resultado==='LOSS'?-1:0;cumE+=isNaN(r)?0:r;ePts.push({y:parseFloat(cumE.toFixed(2)),lbl:o.semana||String(i+1)});});
  var cumN=0,nPts=[{y:0,lbl:'0'}];
  noejec.forEach(function(o,i){var r=parseFloat(o.rr||0);cumN+=isNaN(r)?0:r;nPts.push({y:parseFloat(cumN.toFixed(2)),lbl:String(i+1)});});
  html+=svgLine([{color:'#27AE60',dashed:false,pts:ePts},{color:'#F39C12',dashed:true,pts:nPts}],200);
  html+='<div class="chart-legend"><div class="leg-item"><div class="leg-dot" style="background:#27AE60"></div>EJECUTADOS</div><div class="leg-item"><div class="leg-dot" style="background:#F39C12;opacity:.7"></div>NO EJECUTADOS</div></div></div>';

  // DS
  // DS tendencia - usar TODAS las ops ejecutables con semana (no requiere resultado)
  var wMap={};execAll.forEach(function(o){var w=o.semana;if(!w)return;if(!wMap[w])wMap[w]=[];wMap[w].push(dsScore(o));});
  var wks=Object.keys(wMap).sort();
  var dsPts=wks.map(function(w){var v=wMap[w];return {y:parseFloat((v.reduce(function(a,b){return a+b;},0)/v.length).toFixed(1)),lbl:w};});
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#c8a84b">DISCIPLINE SCORE - TENDENCIA SEMANAL</div>';
  html+=dsPts.length>=2?svgLine([{color:'#c8a84b',dashed:false,pts:dsPts}],180,100,0,true):'<div style="color:#3a3020;font-size:10px;padding:20px 0;text-transform:uppercase;letter-spacing:.5px">Registra semana en tus ops para ver tendencia</div>';
  html+='</div>';

  // DISTRIBUCIÓN R
  // DISTRIBUCIÓN R - ops con resultado O con RR registrado
  var bk=[0,0,0,0,0,0,0];
  execAll.forEach(function(o){
    var r;
    if(o.resultado==='WIN')r=parseFloat(o.rr_final||o.rr||0);
    else if(o.resultado==='LOSS')r=-1;
    else if(o.resultado==='BE')r=0;
    else if(o.rr_final||o.rr)r=parseFloat(o.rr_final||o.rr); // sin resultado pero con RR
    else return;
    if(isNaN(r))return;
    if(r<=-2)bk[0]++;else if(r<-1)bk[1]++;else if(r<0)bk[2]++;else if(r<1)bk[3]++;else if(r<2)bk[4]++;else if(r<3)bk[5]++;else bk[6]++;
  });
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#6eb8ff">DISTRIBUCIÓN R-MÚLTIPLES</div>';
  html+=svgBar(['<-2','-2/-1','-1/0','0/1','1/2','2/3','>3'],bk,['#ff4e4e','#ff6e4e','#ff9e4e','#706050','#4eaeff','#27AE60','#27AE60'],160);
  html+='</div>';

  // WR POR SESIÓN
  var sL=[],sV=[],sC=[];
  SESIONES.slice(0,4).forEach(function(ses){
    var sOps=execAll.filter(function(o){return o.sesion===ses;});if(!sOps.length)return;
    var sRes=sOps.filter(function(o){return o.resultado;});
    var sW=sRes.filter(function(o){return o.resultado==='WIN';});
    var pct=sRes.length?parseFloat(((sW.length/sRes.length)*100).toFixed(0)):0;
    sL.push(ses+'('+sOps.length+')');sV.push(pct);sC.push(SES_COLORS[ses]||'#a09880');
  });
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#6eb8ff">WIN RATE POR SESIÓN</div>';
  html+=sL.length?svgBar(sL,sV,sC,160,true):'<div style="color:#3a3020;font-size:10px;padding:20px 0;text-transform:uppercase;letter-spacing:.5px">Sin datos</div>';
  html+='</div></div>';

  // EXPECTANCY POR SETUP
  var stL=[],stV=[],stC=[];
  SETUPS.forEach(function(s){
    var sOps=exec.filter(function(o){return o.setup===s;});if(sOps.length<2)return;
    var sW=sOps.filter(function(o){return o.resultado==='WIN';});
    var wd=sW.length/sOps.length;
    var aW=sW.length?sW.reduce(function(a,o){return a+parseFloat(o.rr_final||o.rr||0);},0)/sW.length:0;
    stL.push(s);stV.push(parseFloat(((wd*aW)-((1-wd)*1)).toFixed(3)));stC.push(SETUP_COLORS[s]||'#a09880');
  });
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#c8a84b">EXPECTANCY POR SETUP (MÍN. 2 OPS)</div>';
  html+=stL.length?svgBar(stL,stV,stC,160,false,true):'<div style="color:#3a3020;font-size:10px;padding:20px 0;text-transform:uppercase;letter-spacing:.5px">Sin datos suficientes (mín. 2 ops por setup)</div>';
  html+='</div>';

  c.innerHTML=html;
}

function svgLine(datasets,H,maxY,minY,ref80){
  H=H||200;var W=940,PL=46,PR=22,PT=14,PB=30,gW=W-PL-PR,gH=H-PT-PB;
  var allY=[];datasets.forEach(function(d){d.pts.forEach(function(p){allY.push(p.y);});});
  if(!allY.length)return '<div style="color:#3a3020;font-size:10px;padding:20px;text-transform:uppercase;letter-spacing:.5px">Sin datos suficientes</div>';
  var yMn=minY!==undefined?minY:Math.min.apply(null,allY);
  var yMx=maxY!==undefined?maxY:Math.max.apply(null,allY);
  if(ref80){yMn=Math.min(yMn,0);yMx=Math.max(yMx,100);}else{yMn=Math.min(yMn,0);}
  var rY=yMx-yMn||1;
  var mL=0;datasets.forEach(function(d){if(d.pts.length>mL)mL=d.pts.length;});if(mL<2)mL=2;
  function px(i){return PL+(i/(mL-1))*gW;}
  function py(y){return PT+gH-((y-yMn)/rY)*gH;}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';
  for(var i=0;i<=5;i++){var yv=yMn+(rY/5)*i,yp=py(yv);svg+='<line x1="'+PL+'" y1="'+yp+'" x2="'+(W-PR)+'" y2="'+yp+'" stroke="#151210" stroke-width="1"/><text x="'+(PL-4)+'" y="'+(yp+4)+'" fill="#504840" font-size="11" text-anchor="end" font-family="Courier New,monospace">'+yv.toFixed(1)+'</text>';}
  if(yMn<0&&yMx>0){var zp=py(0);svg+='<line x1="'+PL+'" y1="'+zp+'" x2="'+(W-PR)+'" y2="'+zp+'" stroke="#3a3020" stroke-width="1" stroke-dasharray="4,4"/>';}
  if(ref80){var r8=py(80);svg+='<line x1="'+PL+'" y1="'+r8+'" x2="'+(W-PR)+'" y2="'+r8+'" stroke="#ff4e4e" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/><text x="'+(W-PR+3)+'" y="'+(r8+4)+'" fill="#ff4e4e" font-size="10" font-family="Courier New,monospace">80</text>';}
  svg+='<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/><line x1="'+PL+'" y1="'+(H-PB)+'" x2="'+(W-PR)+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/>';
  datasets.forEach(function(d){
    if(d.pts.length<2)return;
    var pp=d.pts.map(function(p,i){return px(i)+','+py(p.y);}).join(' ');
    svg+='<polyline points="'+pp+'" fill="none" stroke="'+d.color+'" stroke-width="2.5"'+(d.dashed?' stroke-dasharray="7,5"':'')+' opacity="0.9"/>';
    d.pts.forEach(function(p,i){svg+='<circle cx="'+px(i)+'" cy="'+py(p.y)+'" r="3.5" fill="'+d.color+'"/>';});
  });
  var fd=datasets[0];
  if(fd&&fd.pts.length>0){var st=Math.max(1,Math.ceil(fd.pts.length/10));fd.pts.forEach(function(p,i){if(i%st!==0&&i!==fd.pts.length-1)return;svg+='<text x="'+px(i)+'" y="'+(H-PB+16)+'" fill="#504840" font-size="11" text-anchor="middle" font-family="Courier New,monospace">'+escH(p.lbl)+'</text>';});}
  return svg+'</svg>';
}

function svgBar(labels,vals,colors,H,pct,neg){
  H=H||160;var W=460,PL=42,PR=10,PT=14,PB=38,gW=W-PL-PR,gH=H-PT-PB;
  if(!labels.length)return '<div style="color:#3a3020;font-size:10px;padding:20px;text-transform:uppercase">Sin datos</div>';
  var yMx=Math.max.apply(null,vals.concat([0]));
  var yMn=neg?Math.min.apply(null,vals.concat([0])):0;
  if(pct){yMx=100;yMn=0;}
  var rY=yMx-yMn||1;
  function py(y){return PT+gH-((y-yMn)/rY)*gH;}
  var bw=Math.max(8,(gW/labels.length)*0.6),gap=gW/labels.length;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';
  for(var i=0;i<=4;i++){var yv=yMn+(rY/4)*i,yp=py(yv);svg+='<line x1="'+PL+'" y1="'+yp+'" x2="'+(W-PR)+'" y2="'+yp+'" stroke="#151210" stroke-width="1"/><text x="'+(PL-4)+'" y="'+(yp+4)+'" fill="#504840" font-size="11" text-anchor="end" font-family="Courier New,monospace">'+yv.toFixed(1)+'</text>';}
  if(yMn<0&&yMx>0){var zp=py(0);svg+='<line x1="'+PL+'" y1="'+zp+'" x2="'+(W-PR)+'" y2="'+zp+'" stroke="#3a3020" stroke-width="1" stroke-dasharray="4,4"/>';}
  svg+='<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/><line x1="'+PL+'" y1="'+(H-PB)+'" x2="'+(W-PR)+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/>';
  labels.forEach(function(lbl,i){
    var v=vals[i]||0,cx=PL+gap*i+gap/2,x=cx-bw/2,bH=Math.abs((v/rY)*gH),y=v>=0?py(v):py(0),col=colors[i]||'#c8a84b';
    svg+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bH+'" fill="'+col+'" opacity="0.8"/>';
    svg+='<text x="'+cx+'" y="'+(y-(v>=0?5:-13))+'" fill="'+col+'" font-size="11" text-anchor="middle" font-family="Courier New,monospace" font-weight="bold">'+v+'</text>';
    svg+='<text x="'+cx+'" y="'+(H-PB+14)+'" fill="#504840" font-size="10" text-anchor="middle" font-family="Courier New,monospace">'+(lbl.length>7?lbl.slice(0,6)+'':escH(lbl))+'</text>';
  });
  return svg+'</svg>';
}
