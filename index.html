<script>
var SK='ojpc_2026_v3',SK_FOND='ojpc_fondos_v1';
var TIPOS=['MERCADO','LÃMITE','NO EJECUTADO','NO EJEC. LÃMITE','[MS] MERCADO','[MS] LÃMITE'];
var SETUPS=['GREEN CRYPTO','SFP','MECHA','GREEN C. LIMIT','BLUE','RED','PINK','WHYTE','GREEN FOREX','OTROS'];
var RIESGOS=['0.5%-5k','1%-5k','0.5%-10k','1%-10k','0.5%-25k','1%-25k','0.5%-50k','1%-50k','0.5%-100k','1%-100k'];
var TF_OPTS=['30s','1m','2m','5m','15m','1h','4h'];
var MODALIDADES=['Swing','Day','Scalp','Micro-Scalp','HÃ­brida','F S-D','F D-S','F S-MS'];
var SESGOS=['Alcista','Bajista','Neutro'];
var SESIONES=['Asia','Londres','Nueva York','Overlap','Fuera sesiÃ³n'];
var MAL_CATS=['FOMO','REVENGE','MOVÃ STOP','SL AJUSTADO','SL AMPLIO','CERRÃ PRONTO','MANTUVE PÃRD.','SOBRE-APALANCADO','FUERA DE SESIÃN','SIN SETUP'];
var LEV_OPTS=['Nada','Bajo','Medio','Alto'];

var TIPO_COLORS={'MERCADO':'#27AE60','LÃMITE':'#c8c0b0','NO EJECUTADO':'#F39C12','NO EJEC. LÃMITE':'#ff4e4e','[MS] MERCADO':'#e91e8c','[MS] LÃMITE':'#e91e8c'};
var TIPO_CSS={'MERCADO':'t-MERCADO','LÃMITE':'t-LIMITE','NO EJECUTADO':'t-NOEJ','NO EJEC. LÃMITE':'t-NOEJL','[MS] MERCADO':'t-MS','[MS] LÃMITE':'t-MS'};
var MODAL_COLORS={'Swing':'#27AE60','Day':'#6eb8ff','Scalp':'#F39C12','Micro-Scalp':'#e91e8c','HÃ­brida':'#c8a84b','F S-D':'#a09880','F D-S':'#a09880','F S-MS':'#a09880'};
var SETUP_COLORS={'GREEN CRYPTO':'#27AE60','SFP':'#c8a84b','MECHA':'#ffb84e','GREEN C. LIMIT':'#a8862b','BLUE':'#4eb8ff','RED':'#ff4e4e','PINK':'#ff9eb8','WHYTE':'#e8e0d0','GREEN FOREX':'#2ecc71','OTROS':'#4a4540'};
var FOND_PAL=['#6eb8ff','#27AE60','#e91e8c','#F39C12','#c8a84b','#ff9eb8','#2ecc71','#ff4e4e'];
var SES_COLORS={'Asia':'#6eb8ff','Londres':'#27AE60','Nueva York':'#F39C12','Overlap':'#c8a84b','Fuera sesiÃ³n':'#5a4f35'};

var ops=[],fonds=[],expandedId=null,pnlMode=false;
var _fSemana='',_fTipo='',_fSetup='',_fFond='';

function loadOps(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch(e){return[];}}
function saveOps(){localStorage.setItem(SK,JSON.stringify(ops));gdriveSaveDebounced();}
function loadFonds(){try{return JSON.parse(localStorage.getItem(SK_FOND))||[];}catch(e){return[];}}
function saveFonds(){localStorage.setItem(SK_FOND,JSON.stringify(fonds));}
function fondColor(n){var i=fonds.indexOf(n);return i>=0?FOND_PAL[i%FOND_PAL.length]:'#5a4f35';}
function newId(){return Date.now()+Math.floor(Math.random()*1000);}
function seqNum(id){var i=ops.findIndex(function(o){return o.id===id;});return i>=0?ops.length-i:'';}

function emptyOp(){
  return {id:newId(),tipo:'MERCADO',fecha:'',hora:'',sesion:'',activo:'',direccion:'',rr:'',
    resultado:'',resultado_usd:'',semana:'',sesgo:'',modalidad:'',tf_entrada:'',
    sent_antes:0,sent_al_ejecutar:0,sent_durante:0,sent_cierre:0,
    espero:'',bien:'',mal_cats:'',mejorar:'',nota_psico:'',enlace:'',
    setup:'',riesgo:'',parciales:'',rr_final:'',leverage:'',
    notas_operativa:'',fondeada:''};
}

function dsScore(op){
  var s=0;
  if(op.setup&&op.setup!=='OTROS')s+=25;
  if(parseFloat(op.rr)>=1.5)s+=25;
  if(op.sesion&&op.sesion!=='Fuera sesiÃ³n')s+=25;
  if(op.tipo==='MERCADO'||op.tipo==='LÃMITE')s+=25;
  return s;
}
function dsCls(s){return s>=80?'ds-g':s>=50?'ds-o':'ds-r';}
function rrCls(r){var v=parseFloat(r);return isNaN(v)?'':v>=1.5?'rr-hot':v>=0.5?'rr-mid':'rr-low';}
function parseFecha(f){if(!f)return 0;var p=f.split('/');if(p.length!==3)return 0;return new Date(p[2],p[1]-1,p[0]).getTime();}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mC(c){var m=MODAL_COLORS[c];return m||'#a09880';}

function showPage(p){

}

  if(am)am.innerHTML='<option value="">TODAS MODAL.</option>'+MODALIDADES.map(function(x){return '<option>'+x+'</option>';}).join('');
  if(at)at.innerHTML='<option value="">TODOS TIPOS</option>'+TIPOS.map(function(x){return '<option>'+x+'</option>';}).join('');
}

}

  return ops.filter(function(o){

    if(_fSetup&&o.setup!==_fSetup)return false;
    if(_fFond&&o.fondeada!==_fFond)return false;
    return true;
  });
}

function addOp(){ops.unshift(emptyOp());saveOps();renderOps();}
function deleteOp(id){if(!confirm('Â¿Borrar esta operaciÃ³n?'))return;ops=ops.filter(function(o){return o.id!==id;});if(expandedId===id)expandedId=null;saveOps();renderOps();}
function clearData(){
  if(!confirm('â  Â¿BORRAR TODAS LAS OPERACIONES?\n\nEsta acciÃ³n NO se puede deshacer.\nExporta primero si quieres un backup.'))return;
  var conf=prompt('Escribe BORRAR para confirmar:');
  if(conf!=='BORRAR')return;
  ops=[];expandedId=null;saveOps();renderOps();

function toggleExpand(id){expandedId=expandedId===id?null:id;renderOps();}

function calcSemana(fecha){
  // fecha: DD/MM/AA o DD/MM/AAAA
  if(!fecha)return '';
  var p=fecha.split('/');if(p.length!==3)return '';
  var y=parseInt(p[2]);if(y<100)y+=2000;
  var d=new Date(y,parseInt(p[1])-1,parseInt(p[0]));
  if(isNaN(d.getTime()))return '';
  // ISO week
  var tmp=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dayNum=tmp.getUTCDay()||7;
  tmp.setUTCDate(tmp.getUTCDate()+4-dayNum);
  var yearStart=new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  var week=Math.ceil((((tmp-yearStart)/86400000)+1)/7);
  var yy=String(d.getFullYear()).slice(2);
  return 'W'+String(week).padStart(2,'0')+'-'+yy;
}

function updateOp(id,field,val){
  var op=ops.find(function(o){return o.id===id;});
  if(!op)return;
  op[field]=val;
  // Auto-calcular semana al cambiar fecha
  if(field==='fecha'&&val){
    var semAuto=calcSemana(val);
    if(semAuto&&!op.semana){
      op.semana=semAuto;
      var semEl=document.querySelector('#exp-semana-'+id);
      if(semEl)semEl.value=semAuto;
    }
  }
  saveOps();
  var score=dsScore(op);
  var badge=document.getElementById('ds-'+id);
  if(badge){badge.className=dsCls(score);badge.textContent=score;}
}

function toggleMalCat(id,cat,el){
  var op=ops.find(function(o){return o.id===id;});if(!op)return;

function renderOps(){
  var list=document.getElementById('ops-list');
  var filtered=filteredOps();
  if(filtered.length===0){list.innerHTML='<div style="text-align:center;padding:40px;color:#3a3020;letter-spacing:2px;font-size:10px">SIN OPERACIONES</div>';return;}
  // Ordenar por fecha desc, sin fecha al final
  filtered.sort(function(a,b){
    var da=parseFecha(a.fecha),db=parseFecha(b.fecha);
    if(!da&&!db)return 0;
    if(!da)return 1;
    if(!db)return -1;
    if(db!==da)return db-da;
    return (b.hora||'').localeCompare(a.hora||'');
  });
  var html='';
  filtered.forEach(function(op,idx){html+=renderCard(op,idx+1);});
  list.innerHTML=html;
}

  return '';
}

// IMPORT/EXPORT
function openImport(){document.getElementById('modal-import').classList.add('open');}
function closeImport(){document.getElementById('modal-import').classList.remove('open');document.getElementById('import-ta').value='';document.getElementById('import-msg').textContent='';}
function doImport(){
  var raw=document.getElementById('import-ta').value.trim();
  var msg=document.getElementById('import-msg');
  try{
    var data=JSON.parse(raw);var list=data.operaciones||data;
    if(!Array.isArray(list)){msg.textContent='Error: formato incorrecto';return;}
    var added=0;
    list.forEach(function(item){
      var op=emptyOp();
      Object.keys(item).forEach(function(k){if(k==='notas')op.notas_operativa=item[k];else if(k in op)op[k]=item[k];});
      if(!op.semana&&op.fecha)op.semana=calcSemana(op.fecha);
      ops.unshift(op);added++;
    });
    saveOps();renderOps();
    msg.style.color='#27AE60';msg.textContent='â '+added+' operaciones importadas';
    setTimeout(closeImport,1500);
  }catch(e){msg.style.color='#ff4e4e';msg.textContent='Error: JSON invÃ¡lido';}
}
function exportOp(id){
  var op=ops.find(function(o){return o.id===id;});
  if(!op)return;
  var b=new Blob([JSON.stringify([op],null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='op_'+escH(op.fecha||id)+'_'+escH(op.activo||'')+'_'+escH(op.tipo||'')+'.json';a.click();
}
function exportJSON(){
  var b=new Blob([JSON.stringify(ops,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ojpc_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

function renderMetrics(){
  var c=document.getElementById('metrics-content');if(!c)return;
  var eT=['MERCADO','LÃMITE','[MS] MERCADO','[MS] LÃMITE'];
  var execAll=ops.filter(function(o){return eT.indexOf(o.tipo)>=0;});
  var exec=execAll.filter(function(o){return o.resultado;});
  var sinRes=execAll.length-exec.length;
  var wins=exec.filter(function(o){return o.resultado==='WIN';});
  var losses=exec.filter(function(o){return o.resultado==='LOSS';});
  var wr=exec.length>0?((wins.length/exec.length)*100).toFixed(1):'0';
  var rrV=exec.filter(function(o){return o.rr_final||o.rr;}).map(function(o){return parseFloat(o.rr_final||o.rr);});
  var rrM=rrV.length>0?(rrV.reduce(function(a,b){return a+b;},0)/rrV.length).toFixed(2):'-';

function resetAnalysis(){document.getElementById('an-modal').value='';document.getElementById('an-sesion').value='';document.getElementById('an-tipo').value='';renderAnalysis();}

function renderAnalysis(){
  var c=document.getElementById('analysis-content');if(!c)return;
  var anM=document.getElementById('an-modal').value;
  var anS=document.getElementById('an-sesion').value;
  var anT=document.getElementById('an-tipo').value;
  var filt=ops.slice();
  if(anM)filt=filt.filter(function(o){return o.modalidad===anM;});
  if(anS)filt=filt.filter(function(o){return o.sesion===anS;});
  if(anT)filt=filt.filter(function(o){return o.tipo===anT;});
  filt.sort(function(a,b){return parseFecha(a.fecha)-parseFecha(b.fecha);});

  var eT=['MERCADO','LÃMITE','[MS] MERCADO','[MS] LÃMITE'];
  var execAll=filt.filter(function(o){return eT.indexOf(o.tipo)>=0;});
  var exec=execAll.filter(function(o){return o.resultado;});
  var noejec=filt.filter(function(o){return (o.tipo==='NO EJECUTADO'||o.tipo==='NO EJEC. LÃMITE')&&o.rr;});
  var html='';

  // EQUITY CURVE
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#27AE60">EQUITY CURVE â R ACUMULADO</div>';
  var cumE=0,ePts=[{y:0,lbl:'0'}];
  exec.forEach(function(o,i){var r=o.resultado==='WIN'?parseFloat(o.rr_final||o.rr||0):o.resultado==='LOSS'?-1:0;cumE+=isNaN(r)?0:r;ePts.push({y:parseFloat(cumE.toFixed(2)),lbl:o.semana||String(i+1)});});
  var cumN=0,nPts=[{y:0,lbl:'0'}];
  noejec.forEach(function(o,i){var r=parseFloat(o.rr||0);cumN+=isNaN(r)?0:r;nPts.push({y:parseFloat(cumN.toFixed(2)),lbl:String(i+1)});});
  html+=svgLine([{color:'#27AE60',dashed:false,pts:ePts},{color:'#F39C12',dashed:true,pts:nPts}],200);
  html+='<div class="chart-legend"><div class="leg-item"><div class="leg-dot" style="background:#27AE60"></div>EJECUTADOS</div><div class="leg-item"><div class="leg-dot" style="background:#F39C12;opacity:.7"></div>NO EJECUTADOS</div></div></div>';

  // DS
  // DS tendencia â usar TODAS las ops ejecutables con semana (no requiere resultado)
  var wMap={};execAll.forEach(function(o){var w=o.semana;if(!w)return;if(!wMap[w])wMap[w]=[];wMap[w].push(dsScore(o));});
  var wks=Object.keys(wMap).sort();
  var dsPts=wks.map(function(w){var v=wMap[w];return {y:parseFloat((v.reduce(function(a,b){return a+b;},0)/v.length).toFixed(1)),lbl:w};});
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#c8a84b">DISCIPLINE SCORE â TENDENCIA SEMANAL</div>';
  html+=dsPts.length>=2?svgLine([{color:'#c8a84b',dashed:false,pts:dsPts}],180,100,0,true):'<div style="color:#3a3020;font-size:10px;padding:20px 0;text-transform:uppercase;letter-spacing:.5px">Registra semana en tus ops para ver tendencia</div>';
  html+='</div>';

  // DISTRIBUCIÃN R
  // DISTRIBUCIÃN R â ops con resultado O con RR registrado
  var bk=[0,0,0,0,0,0,0];
  execAll.forEach(function(o){
    var r;
    if(o.resultado==='WIN')r=parseFloat(o.rr_final||o.rr||0);
    else if(o.resultado==='LOSS')r=-1;
    else if(o.resultado==='BE')r=0;
    else if(o.rr_final||o.rr)r=parseFloat(o.rr_final||o.rr); // sin resultado pero con RR
    else return;
    if(isNaN(r))return;
    if(r<=-2)bk[0]++;else if(r<-1)bk[1]++;else if(r<0)bk[2]++;else if(r<1)bk[3]++;else if(r<2)bk[4]++;else if(r<3)bk[5]++;else bk[6]++;
  });
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#6eb8ff">DISTRIBUCIÃN R-MÃLTIPLES</div>';
  html+=svgBar(['<-2','-2/-1','-1/0','0/1','1/2','2/3','>3'],bk,['#ff4e4e','#ff6e4e','#ff9e4e','#706050','#4eaeff','#27AE60','#27AE60'],160);
  html+='</div>';

  // WR POR SESIÃN
  var sL=[],sV=[],sC=[];
  SESIONES.slice(0,4).forEach(function(ses){
    var sOps=execAll.filter(function(o){return o.sesion===ses;});if(!sOps.length)return;
    var sRes=sOps.filter(function(o){return o.resultado;});
    var sW=sRes.filter(function(o){return o.resultado==='WIN';});
    var pct=sRes.length?parseFloat(((sW.length/sRes.length)*100).toFixed(0)):0;
    sL.push(ses+'('+sOps.length+')');sV.push(pct);sC.push(SES_COLORS[ses]||'#a09880');
  });
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#6eb8ff">WIN RATE POR SESIÃN</div>';
  html+=sL.length?svgBar(sL,sV,sC,160,true):'<div style="color:#3a3020;font-size:10px;padding:20px 0;text-transform:uppercase;letter-spacing:.5px">Sin datos</div>';
  html+='</div></div>';

  // EXPECTANCY POR SETUP
  var stL=[],stV=[],stC=[];
  SETUPS.forEach(function(s){
    var sOps=exec.filter(function(o){return o.setup===s;});if(sOps.length<2)return;
    var sW=sOps.filter(function(o){return o.resultado==='WIN';});
    var wd=sW.length/sOps.length;
    var aW=sW.length?sW.reduce(function(a,o){return a+parseFloat(o.rr_final||o.rr||0);},0)/sW.length:0;
    stL.push(s);stV.push(parseFloat(((wd*aW)-((1-wd)*1)).toFixed(3)));stC.push(SETUP_COLORS[s]||'#a09880');
  });
  html+='<div class="chart-box"><div class="chart-ttl" style="color:#c8a84b">EXPECTANCY POR SETUP (MÃN. 2 OPS)</div>';
  html+=stL.length?svgBar(stL,stV,stC,160,false,true):'<div style="color:#3a3020;font-size:10px;padding:20px 0;text-transform:uppercase;letter-spacing:.5px">Sin datos suficientes (mÃ­n. 2 ops por setup)</div>';
  html+='</div>';

  c.innerHTML=html;
}

function svgLine(datasets,H,maxY,minY,ref80){
  H=H||200;var W=940,PL=46,PR=22,PT=14,PB=30,gW=W-PL-PR,gH=H-PT-PB;
  var allY=[];datasets.forEach(function(d){d.pts.forEach(function(p){allY.push(p.y);});});
  if(!allY.length)return '<div style="color:#3a3020;font-size:10px;padding:20px;text-transform:uppercase;letter-spacing:.5px">Sin datos suficientes</div>';
  var yMn=minY!==undefined?minY:Math.min.apply(null,allY);
  var yMx=maxY!==undefined?maxY:Math.max.apply(null,allY);
  if(ref80){yMn=Math.min(yMn,0);yMx=Math.max(yMx,100);}else{yMn=Math.min(yMn,0);}
  var rY=yMx-yMn||1;
  var mL=0;datasets.forEach(function(d){if(d.pts.length>mL)mL=d.pts.length;});if(mL<2)mL=2;
  function px(i){return PL+(i/(mL-1))*gW;}
  function py(y){return PT+gH-((y-yMn)/rY)*gH;}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';
  for(var i=0;i<=5;i++){var yv=yMn+(rY/5)*i,yp=py(yv);svg+='<line x1="'+PL+'" y1="'+yp+'" x2="'+(W-PR)+'" y2="'+yp+'" stroke="#151210" stroke-width="1"/><text x="'+(PL-4)+'" y="'+(yp+4)+'" fill="#504840" font-size="11" text-anchor="end" font-family="Courier New,monospace">'+yv.toFixed(1)+'</text>';}
  if(yMn<0&&yMx>0){var zp=py(0);svg+='<line x1="'+PL+'" y1="'+zp+'" x2="'+(W-PR)+'" y2="'+zp+'" stroke="#3a3020" stroke-width="1" stroke-dasharray="4,4"/>';}
  if(ref80){var r8=py(80);svg+='<line x1="'+PL+'" y1="'+r8+'" x2="'+(W-PR)+'" y2="'+r8+'" stroke="#ff4e4e" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/><text x="'+(W-PR+3)+'" y="'+(r8+4)+'" fill="#ff4e4e" font-size="10" font-family="Courier New,monospace">80</text>';}
  svg+='<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/><line x1="'+PL+'" y1="'+(H-PB)+'" x2="'+(W-PR)+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/>';
  datasets.forEach(function(d){
    if(d.pts.length<2)return;
    var pp=d.pts.map(function(p,i){return px(i)+','+py(p.y);}).join(' ');
    svg+='<polyline points="'+pp+'" fill="none" stroke="'+d.color+'" stroke-width="2.5"'+(d.dashed?' stroke-dasharray="7,5"':'')+' opacity="0.9"/>';
    d.pts.forEach(function(p,i){svg+='<circle cx="'+px(i)+'" cy="'+py(p.y)+'" r="3.5" fill="'+d.color+'"/>';});
  });
  var fd=datasets[0];
  if(fd&&fd.pts.length>0){var st=Math.max(1,Math.ceil(fd.pts.length/10));fd.pts.forEach(function(p,i){if(i%st!==0&&i!==fd.pts.length-1)return;svg+='<text x="'+px(i)+'" y="'+(H-PB+16)+'" fill="#504840" font-size="11" text-anchor="middle" font-family="Courier New,monospace">'+escH(p.lbl)+'</text>';});}
  return svg+'</svg>';
}

function svgBar(labels,vals,colors,H,pct,neg){
  H=H||160;var W=460,PL=42,PR=10,PT=14,PB=38,gW=W-PL-PR,gH=H-PT-PB;
  if(!labels.length)return '<div style="color:#3a3020;font-size:10px;padding:20px;text-transform:uppercase">Sin datos</div>';
  var yMx=Math.max.apply(null,vals.concat([0]));
  var yMn=neg?Math.min.apply(null,vals.concat([0])):0;
  if(pct){yMx=100;yMn=0;}
  var rY=yMx-yMn||1;
  function py(y){return PT+gH-((y-yMn)/rY)*gH;}
  var bw=Math.max(8,(gW/labels.length)*0.6),gap=gW/labels.length;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';
  for(var i=0;i<=4;i++){var yv=yMn+(rY/4)*i,yp=py(yv);svg+='<line x1="'+PL+'" y1="'+yp+'" x2="'+(W-PR)+'" y2="'+yp+'" stroke="#151210" stroke-width="1"/><text x="'+(PL-4)+'" y="'+(yp+4)+'" fill="#504840" font-size="11" text-anchor="end" font-family="Courier New,monospace">'+yv.toFixed(1)+'</text>';}
  if(yMn<0&&yMx>0){var zp=py(0);svg+='<line x1="'+PL+'" y1="'+zp+'" x2="'+(W-PR)+'" y2="'+zp+'" stroke="#3a3020" stroke-width="1" stroke-dasharray="4,4"/>';}
  svg+='<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/><line x1="'+PL+'" y1="'+(H-PB)+'" x2="'+(W-PR)+'" y2="'+(H-PB)+'" stroke="#2a2816" stroke-width="1"/>';
  labels.forEach(function(lbl,i){
    var v=vals[i]||0,cx=PL+gap*i+gap/2,x=cx-bw/2,bH=Math.abs((v/rY)*gH),y=v>=0?py(v):py(0),col=colors[i]||'#c8a84b';
    svg+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bH+'" fill="'+col+'" opacity="0.8"/>';
    svg+='<text x="'+cx+'" y="'+(y-(v>=0?5:-13))+'" fill="'+col+'" font-size="11" text-anchor="middle" font-family="Courier New,monospace" font-weight="bold">'+v+'</text>';
    svg+='<text x="'+cx+'" y="'+(H-PB+14)+'" fill="#504840" font-size="10" text-anchor="middle" font-family="Courier New,monospace">'+(lbl.length>7?lbl.slice(0,6)+'â¦':escH(lbl))+'</text>';
  });
  return svg+'</svg>';
}

var gdriveToken=null,gdriveFileId=null,gdriveTimer=null;
function gdriveSetStatus(t){var el=document.getElementById('gdrive-status');if(el)el.textContent=t;}
function gdriveInit(){if(typeof google==='undefined'){setTimeout(gdriveInit,1000);return;}google.accounts.oauth2.initTokenClient({client_id:GDRIVE_CLIENT_ID,scope:GDRIVE_SCOPE,callback:function(r){if(r.error){gdriveSetStatus('Sin auth');return;}gdriveToken=r.access_token;gdriveSetStatus('Cargando...');gdriveFindOrCreate().then(function(){return gdriveLoad();}).then(function(d){if(d){if(d.ops){localStorage.setItem(SK,JSON.stringify(d.ops));ops=loadOps();}if(d.fondos){localStorage.setItem(SK_FOND,JSON.stringify(d.fondos));fonds=loadFonds();}populateFilters();renderOps();
  gdriveInit();gdriveSetStatus('OK '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}));}else{gdriveSetStatus('Drive vacio');}});}}).requestAccessToken({prompt:''});}
function gdriveAuth(){if(typeof google==='undefined'){gdriveSetStatus('Google no cargado');return;}google.accounts.oauth2.initTokenClient({client_id:GDRIVE_CLIENT_ID,scope:GDRIVE_SCOPE,callback:function(r){if(r.error){gdriveSetStatus('Error auth');return;}gdriveToken=r.access_token;gdriveSetStatus('Conectando...');gdriveFindOrCreate().then(function(){return gdriveLoad();}).then(function(d){if(d){if(d.ops){localStorage.setItem(SK,JSON.stringify(d.ops));ops=loadOps();}if(d.fondos){localStorage.setItem(SK_FOND,JSON.stringify(d.fondos));fonds=loadFonds();}populateFilters();renderOps();}return gdriveSave();});}}).requestAccessToken({prompt:'consent'});}
function gdriveFindOrCreate(){return fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%27'+GDRIVE_FILENAME+'%27+and+trashed%3Dfalse&fields=files(id)',{headers:{Authorization:'Bearer '+gdriveToken}}).then(function(r){return r.json();}).then(function(j){if(j.files&&j.files.length>0){gdriveFileId=j.files[0].id;return;}var form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:GDRIVE_FILENAME,mimeType:'application/json'})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify({ops:[],fondos:[]})],{type:'application/json'}));return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body:form}).then(function(r){return r.json();}).then(function(j){gdriveFileId=j.id;});}).catch(function(){gdriveSetStatus('Error Drive');});}
function gdriveLoad(){if(!gdriveToken||!gdriveFileId)return Promise.resolve(null);return fetch('https://www.googleapis.com/drive/v3/files/'+gdriveFileId+'?alt=media',{headers:{Authorization:'Bearer '+gdriveToken}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}
function gdriveSave(){if(!gdriveToken||!gdriveFileId)return;gdriveSetStatus('Guardando...');var payload={ops:JSON.parse(localStorage.getItem(SK)||'[]'),fondos:JSON.parse(localStorage.getItem(SK_FOND)||'[]'),ts:new Date().toISOString()};var form=new FormData();form.append('metadata',new Blob([JSON.stringify({mimeType:'application/json'})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(payload)],{type:'application/json'}));return fetch('https://www.googleapis.com/upload/drive/v3/files/'+gdriveFileId+'?uploadType=multipart',{method:'PATCH',headers:{Authorization:'Bearer '+gdriveToken},body:form}).then(function(r){gdriveSetStatus(r.ok?'OK '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'Error guardando');}).catch(function(){gdriveSetStatus('Error guardando');});}
function gdriveSaveDebounced(){clearTimeout(gdriveTimer);gdriveTimer=setTimeout(gdriveSave,3000);}

window.addEventListener('load',function(){
  ops=loadOps();fonds=loadFonds();populateFilters();renderOps();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
});
</script>
</body>
</html>
